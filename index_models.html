<!DOCTYPE html>
<html lang="en">
<head>
    <title>HDBS Graphic Simulator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="container">
    <div id="canvas-model-title" aria-live="polite"></div>
</div>
<div id="model-overview">
    <canvas id="model-overview-canvas"></canvas>
    <div id="model-overview-viewport"></div>
</div>
<div id="controls-panel">
    <div class="control-group">
        <div id="load-status" class="status-chip" aria-live="polite">Load status: idle</div>
    </div>
    <div class="control-group">
        <label for="model-select">Select HBDS Model</label>
        <select id="model-select">
            <option value="">Loading models...</option>
        </select>
        <div id="model-select-diagnostics" class="status-note">Loading model manifest…</div>
    </div>
    <div class="control-group">
        <label class="checkbox-wrapper" for="view-toggle">
            <input type="checkbox" id="view-toggle">
            <span>Enable 3-D View</span>
        </label>
    </div>
    <div class="control-group">
        <label for="layout-algorithm-select">Layout Algorithm</label>
        <select id="layout-algorithm-select">
            <option value="none">None</option>
            <option value="grid">Grid</option>
            <option value="hierarchy">Hierarchy</option>
            <option value="radial">Radial</option>
        </select>
    </div>
    <details class="control-group settings-group">
        <summary class="settings-title">Setting</summary>
        <div class="settings-body">
            <span class="settings-subtitle">Lighting</span>
            <label class="range-field" for="horizontal-light-intensity-input"><span>Horizontal Strength</span><input type="range" id="horizontal-light-intensity-input" min="0" max="2" step="0.01" value="1"></label>
            <label class="range-field" for="horizontal-light-angle-input"><span>Horizontal Angle</span><span class="range-control"><input type="range" id="horizontal-light-angle-input" min="0" max="360" step="1" value="0"><output id="horizontal-light-angle-value" class="range-value" for="horizontal-light-angle-input">0deg</output></span></label>
            <label class="range-field" for="vertical-light-intensity-input"><span>Vertical Strength</span><input type="range" id="vertical-light-intensity-input" min="0" max="2" step="0.01" value="0.6"></label>
            <label class="range-field" for="vertical-light-angle-input"><span>Vertical Angle</span><span class="range-control"><input type="range" id="vertical-light-angle-input" min="0" max="360" step="1" value="45"><output id="vertical-light-angle-value" class="range-value" for="vertical-light-angle-input">45deg</output></span></label>
            <button id="reset-scene-settings-button" type="button">Reset Scene Settings</button>
        </div>
    </details>
    <div class="control-group">
        <button id="fit-model-button">Fit Model</button>
        <button id="save-model-button">Save Model</button>
        <button id="help-shortcuts-button" type="button">Keyboard Help</button>
    </div>
</div>
<div id="keyboard-help" class="help-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="help-title">
    <div class="help-card">
        <h2 id="help-title">Keyboard Shortcuts</h2>
        <ul>
            <li><kbd>H</kbd> Toggle this help</li>
            <li><kbd>F</kbd> Fit model</li>
            <li><kbd>S</kbd> Save model</li>
            <li><kbd>V</kbd> Toggle 2D/3D view</li>
            <li><kbd>Esc</kbd> Close help</li>
        </ul>
        <p class="status-note">Focus order: model selector → view toggle → layout → settings → actions.</p>
        <button id="close-help-button" type="button">Close</button>
    </div>
</div>
<script type="importmap">
    {
      "imports": {
        "three":         "https://unpkg.com/three@0.176.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.176.0/examples/jsm/"
      }
    }

</script>
<script type="module">
    /* ---------- Imports ---------- */
    import * as THREE from 'three';
    import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
    import {DragControls} from 'three/addons/controls/DragControls.js';
    import {CSS2DRenderer} from 'three/addons/renderers/CSS2DRenderer.js';
    import {updateLabelFontSizes} from './js/hbds_class.js?v=font-zoom-20260523a';
    import {updateLabelFontSizes as updateHyperClassLabelFontSizes} from './js/hbds_hyperclass_class.js?v=font-zoom-20260523a';
    import { updateLinkFontSizes, recalculateAllLinks } from './js/hbds_class_link.js?v=font-zoom-20260523a';
    import { updateLinkFontSizes as updateHyperClassLinkFontSizes } from './js/hbds_hyperclass_link.js?v=font-zoom-20260523a';
    import { setData, loadAndRenderScene, saveScene, prepareSceneSnapshot, optimizeAndRefreshLayout, fitModelToCanvas, initModelOverview, updateModelOverview, setupCanvasPanControls, listAvailableModels, getSceneSettings, setSceneSettings, normalizeSceneSettings, getLayoutSettings, setLayoutSettings, getFontSettings, normalizeFontSettings } from './js/hbds_model.js?v=font-zoom-20260523a';
    import { checkServerConnection, listServerModels, loadServerModel, saveServerModel, isServerModelValue, modelFileNameFromValue, modelNameFromValue, serverModelValue } from './js/hbds_server_api.js?v=server-api-20260524a';

    if (new URLSearchParams(window.location.search).get('embeddedShell') === '1') {
        document.body.classList.add('embedded-shell-menu');
    }

    /* ---------- Globals ---------- */
    let scene, camera, renderer, css2DRenderer, orbitControls, dragControls;
    let diagramGroup = new THREE.Group();
    const draggableObjects = [];
    const LIGHT_CIRCLE_RADIUS = 16;
    const LIGHT_CIRCLE_ELEVATION = 7;
    const DEFAULT_HORIZONTAL_LIGHT_INTENSITY = 1;
    const DEFAULT_VERTICAL_LIGHT_INTENSITY = 0.6;
    const DEFAULT_VERTICAL_LIGHT_ANGLE = 45;
    let lightingState = normalizeSimplifiedSceneSettings();
    const defaultLightingState = normalizeSimplifiedSceneSettings();
    let fontState = normalizeFontSettings();
    let sceneLights = {};
    let modelsLoadOk = false;
    let serverConnected = false;

    /* ---------- MAIN APPLICATION ---------- */
    async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(lightingState.background);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        const container = document.getElementById('container');
        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        css2DRenderer = new CSS2DRenderer();
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.domElement.style.position = 'absolute';
        css2DRenderer.domElement.style.top = '0';
        container.appendChild(css2DRenderer.domElement);

        ensureLighting();
        applySceneSettings({ syncControls: true });

        orbitControls = new OrbitControls(camera, css2DRenderer.domElement);
        orbitControls.enableRotate = false;
        orbitControls.addEventListener('change', () => {
            updateLabelFontSizes(camera, renderer);
            updateHyperClassLabelFontSizes(camera, renderer);
            updateLinkFontSizes(camera, renderer);
            updateHyperClassLinkFontSizes(camera, renderer);
            renderOnce();
            updateModelOverview(getModelContext());
        });

        window.addEventListener('resize', onResize);
        const viewToggle = document.getElementById('view-toggle');
        viewToggle.checked = false;
        viewToggle.addEventListener('change', toggleView);
        document.getElementById('save-model-button').addEventListener('click', saveCurrentModel);
        document.getElementById('layout-algorithm-select').addEventListener('change', handleLayoutAlgorithmChange);
        bindSceneSettingsControls();
        document.getElementById('model-select').addEventListener('change', async e => {
            await loadSelectedModel(e.target.value);
        });
        document.getElementById('fit-model-button').addEventListener('click', () => {
            fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
        });
        document.getElementById('help-shortcuts-button')?.addEventListener('click', () => toggleHelpOverlay(true));
        document.getElementById('close-help-button')?.addEventListener('click', () => toggleHelpOverlay(false));
        document.getElementById('keyboard-help')?.addEventListener('click', event => {
            if (event.target?.id === 'keyboard-help') toggleHelpOverlay(false);
        });

        setupCanvasPanControls(getModelContext());
        initModelOverview(getModelContext());
        await refreshServerConnection();
        await populateModelSelect();
        const initialModel = document.getElementById('model-select').value;
        if (initialModel) await loadSelectedModel(initialModel);
        bindKeyboardShortcuts();
    }

    function hasFitMetadata(model) {
        const fit = model?.metadata?.layout?.fit;
        return Boolean(fit && (fit.distance > 0 || fit.fitHeightDistance > 0 || fit.fitWidthDistance > 0));
    }

    async function handleLayoutAlgorithmChange() {
        const algorithm = document.getElementById('layout-algorithm-select').value;
        setLayoutSettings({ ...getLayoutSettings(), algorithm }, { applyContext: false });
        if (algorithm === 'none') {
            updateModelOverview(getModelContext());
            return;
        }
        await optimizeAndRefreshLayout(getModelContext(), { algorithm });
        fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
    }

    async function populateModelSelect() {
        const select = document.getElementById('model-select');
        const diagnostics = document.getElementById('model-select-diagnostics');
        const selectedValue = select.value;
        if (serverConnected) {
            const serverResult = await listServerModels({ timeoutMs: 2500 });
            if (serverResult.ok && serverResult.models.length) {
                select.innerHTML = '';
                serverResult.models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.value;
                    option.textContent = model.label || model.value;
                    select.appendChild(option);
                });
                select.value = serverResult.models.some(model => model.value === selectedValue)
                    ? selectedValue
                    : serverResult.models[0].value;
                diagnostics.textContent = `Loaded ${serverResult.models.length} models from server.`;
                setLoadStatus('Load status: server connected', 'ok');
                modelsLoadOk = true;
                return;
            }
            if (!serverResult.ok) {
                diagnostics.textContent = `Server unavailable: ${serverResult.error?.message || 'request failed'}. Falling back to manifest.`;
                serverConnected = false;
            }
        }
        try {
            const models = await listAvailableModels({
                manifestPath: 'models/models_manifest.json',
                modelsPath: 'models/'
            });
            if (!models.length) {
                setLoadStatus('Load status: no models found', 'warn');
                diagnostics.textContent = 'Manifest loaded but no usable models were found.';
                select.innerHTML = '<option value="">No models available</option>';
                modelsLoadOk = false;
                return;
            }

            select.innerHTML = '';
            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model.value;
                option.textContent = model.label || model.value;
                select.appendChild(option);
            });
            select.value = models.some(model => model.value === selectedValue)
                ? selectedValue
                : models[0].value;
            diagnostics.textContent = `Loaded ${models.length} models from manifest.`;
            setLoadStatus('Load status: manifest loaded', 'ok');
            modelsLoadOk = true;
        } catch (error) {
            select.innerHTML = '<option value="">Failed to load models</option>';
            diagnostics.textContent = `Manifest error: ${error?.message || String(error)}`;
            setLoadStatus('Load status: manifest error', 'error');
            modelsLoadOk = false;
        }
    }

    async function loadSelectedModel(modelPath) {
        if (!modelPath) return;
        const label = document.getElementById('model-select')?.selectedOptions?.[0]?.textContent?.trim() || modelPath;
        setLoadStatus(`Load status: loading ${label}`, 'warn');
        try {
            if (isServerModelValue(modelPath)) {
                const result = await loadServerModel(modelNameFromValue(modelPath), { timeoutMs: 6000 });
                if (!result.ok) throw new Error(result.error?.message || 'Server load failed');
                const loadedModel = setData(result.data.model, { context: getModelContext(), refresh: true });
                updateCanvasModelTitle(result.data.metadata?.label || label);
                if (!hasFitMetadata(loadedModel)) {
                    fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
                }
                setLoadStatus(`Load status: loaded ${label} from server`, 'ok');
                return;
            }
            const loadedModel = await loadAndRenderScene(modelPath, getModelContext(), { allowedBasePath: 'models/' });
            updateCanvasModelTitle();
            if (!hasFitMetadata(loadedModel)) {
                fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
            }
            setLoadStatus(`Load status: loaded ${modelPath}`, 'ok');
        } catch (error) {
            setLoadStatus(`Load status: failed ${label}`, 'error');
            updateCanvasModelTitle('');
        }
    }

    async function saveCurrentModel() {
        try {
            const select = document.getElementById('model-select');
            const selectedModelValue = select.value;
            const fileName = modelFileNameFromValue(selectedModelValue, 'hbds_saved_model.json');

            setSceneSettings(lightingState, { applyContext: false });
            if (!serverConnected) await refreshServerConnection();
            if (serverConnected) {
                setLoadStatus(`Load status: saving ${fileName} to server`, 'warn');
                const snapshot = prepareSceneSnapshot(getModelContext());
                const result = await saveServerModel(fileName, snapshot, { timeoutMs: 8000 });
                if (!result.ok) {
                    serverConnected = false;
                    setLoadStatus(`Load status: server save failed - ${result.error?.message || 'request failed'}`, 'error');
                    return;
                }
                setLoadStatus(`Load status: saved ${result.data.saved} to server`, 'ok');
                await populateModelSelect();
                const savedValue = serverModelValue(result.data.saved);
                if ([...select.options].some(option => option.value === savedValue)) {
                    select.value = savedValue;
                    updateCanvasModelTitle(result.data.metadata?.label || result.data.saved);
                }
                return;
            }

            saveScene(getModelContext(), { fileName });
            setLoadStatus(`Load status: downloaded ${fileName}`, 'ok');
        } catch (error) {
            setLoadStatus(`Load status: save failed - ${error?.message || String(error)}`, 'error');
        }
    }

    async function refreshServerConnection() {
        const result = await checkServerConnection({ timeoutMs: 1200 });
        serverConnected = Boolean(result.ok);
        return serverConnected;
    }

    function setLoadStatus(message, tone) { setStatusChip('load-status', message, tone); }
    function setStatusChip(id, message, tone = 'ok') {
        const chip = document.getElementById(id);
        if (!chip) return;
        chip.className = 'status-chip';
        if (['ok', 'warn', 'error'].includes(tone)) chip.classList.add(tone);
        chip.textContent = message;
    }

    function updateCanvasModelTitle(titleText) {
        const title = document.getElementById('canvas-model-title');
        if (!title) return;
        const selectedOption = document.getElementById('model-select')?.selectedOptions?.[0];
        const text = titleText ?? selectedOption?.textContent?.trim() ?? '';
        title.textContent = text;
        document.body.classList.toggle('has-model', Boolean(text));
    }

    function toggleHelpOverlay(show) {
        const overlay = document.getElementById('keyboard-help');
        if (!overlay) return;
        overlay.hidden = !show;
        if (show) document.getElementById('close-help-button')?.focus();
        else document.getElementById('help-shortcuts-button')?.focus();
    }

    function bindKeyboardShortcuts() {
        window.addEventListener('keydown', event => {
            if (event.key === 'Escape') return toggleHelpOverlay(false);
            if (event.target && ['INPUT', 'SELECT', 'TEXTAREA'].includes(event.target.tagName)) return;
            if (event.key.toLowerCase() === 'h') return toggleHelpOverlay(true);
            if (event.key.toLowerCase() === 'f') return document.getElementById('fit-model-button')?.click();
            if (event.key.toLowerCase() === 's') return document.getElementById('save-model-button')?.click();
            if (event.key.toLowerCase() === 'v') return document.getElementById('view-toggle')?.click();
        });
    }


    function renderOnce() {
        renderer.render(scene, camera);
        css2DRenderer.render(scene, camera);
    }

    function getModelContext() {
        return {
            scene,
            camera,
            renderer,
            css2DRenderer,
            orbitControls,
            dragControls,
            diagramGroup,
            draggableObjects,
            setDiagramGroup: group => { diagramGroup = group; },
            setDragControls: controls => { dragControls = controls; },
            setupDragControls,
            setCamera2D,
            applyModelSceneSettings,
            applyModelLayoutSettings,
            applyModelFontSettings,
            renderOnce
        };
    }

    function normalizeSimplifiedSceneSettings(settings = {}) {
        const source = settings && typeof settings === 'object' ? settings : {};
        const hasExplicitSettings = Object.keys(source).length > 0;
        const normalized = normalizeSceneSettings(source);
        const horizontalSource = normalized.sources?.[0] || {};
        const verticalSource = normalized.sources?.[1] || {};
        const legacyLayeredLighting = normalized.ambient > 0 || normalized.front > 0;
        const horizontalAngle = horizontalLightAngleFromDirection(horizontalSource.direction);
        const verticalAngle = hasExplicitSettings && !legacyLayeredLighting
            ? verticalLightAngleFromDirection(verticalSource.direction)
            : DEFAULT_VERTICAL_LIGHT_ANGLE;
        const horizontalIntensity = normalizeLightIntensity(
            horizontalSource.intensity,
            DEFAULT_HORIZONTAL_LIGHT_INTENSITY,
            hasExplicitSettings,
            legacyLayeredLighting
        );
        const verticalIntensity = normalizeLightIntensity(
            verticalSource.intensity,
            DEFAULT_VERTICAL_LIGHT_INTENSITY,
            hasExplicitSettings,
            legacyLayeredLighting
        );
        return {
            ...normalized,
            ambient: 0,
            front: 0,
            sources: [
                { intensity: horizontalIntensity, direction: horizontalLightDirectionFromAngle(horizontalAngle) },
                { intensity: verticalIntensity, direction: verticalLightDirectionFromAngle(verticalAngle) }
            ]
        };
    }

    function normalizeLightIntensity(value, defaultValue, hasExplicitSettings, legacyLayeredLighting) {
        const intensity = clampNumber(value, 0, 2, defaultValue);
        if (!hasExplicitSettings) return defaultValue;
        return legacyLayeredLighting && intensity <= 0.25 ? defaultValue : intensity;
    }

    function clampNumber(value, min, max, fallback = min) {
        const number = Number(value);
        if (!Number.isFinite(number)) return fallback;
        return Math.min(max, Math.max(min, number));
    }

    function normalizeLightAngle(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return 0;
        if (number === 360) return 360;
        return ((number % 360) + 360) % 360;
    }

    function horizontalLightDirectionFromAngle(angle) {
        const radians = normalizeLightAngle(angle) * Math.PI / 180;
        return {
            x: Number((Math.sin(radians) * LIGHT_CIRCLE_RADIUS).toFixed(3)),
            y: LIGHT_CIRCLE_ELEVATION,
            z: Number((Math.cos(radians) * LIGHT_CIRCLE_RADIUS).toFixed(3))
        };
    }

    function verticalLightDirectionFromAngle(angle) {
        const radians = normalizeLightAngle(angle) * Math.PI / 180;
        return {
            x: 0,
            y: Number((Math.sin(radians) * LIGHT_CIRCLE_RADIUS).toFixed(3)),
            z: Number((Math.cos(radians) * LIGHT_CIRCLE_RADIUS).toFixed(3))
        };
    }

    function horizontalLightAngleFromDirection(direction = {}) {
        const x = Number(direction.x ?? 0);
        const z = Number(direction.z ?? LIGHT_CIRCLE_RADIUS);
        if (!Number.isFinite(x) || !Number.isFinite(z)) return 0;
        return normalizeLightAngle(Math.round(Math.atan2(x, z) * 180 / Math.PI));
    }

    function verticalLightAngleFromDirection(direction = {}) {
        const y = Number(direction.y ?? 0);
        const z = Number(direction.z ?? LIGHT_CIRCLE_RADIUS);
        if (!Number.isFinite(y) || !Number.isFinite(z)) return DEFAULT_VERTICAL_LIGHT_ANGLE;
        return normalizeLightAngle(Math.round(Math.atan2(y, z) * 180 / Math.PI));
    }

    function horizontalLightSource() {
        return lightingState.sources?.[0] || {
            intensity: DEFAULT_HORIZONTAL_LIGHT_INTENSITY,
            direction: horizontalLightDirectionFromAngle(0)
        };
    }

    function verticalLightSource() {
        return lightingState.sources?.[1] || {
            intensity: DEFAULT_VERTICAL_LIGHT_INTENSITY,
            direction: verticalLightDirectionFromAngle(DEFAULT_VERTICAL_LIGHT_ANGLE)
        };
    }

    function effectiveLightIntensity(source, fallback) {
        return source.direction?.z < 0 ? 0 : clampNumber(source.intensity, 0, 2, fallback);
    }

    function ensureLighting() {
        const ambient = new THREE.AmbientLight(0xffffff, lightingState.ambient);
        ambient.name = 'hbds-ambient-light';
        scene.add(ambient);

        const front = new THREE.DirectionalLight(0xffffff, lightingState.front);
        front.name = 'hbds-front-light';
        front.position.set(-3, 2, 16);
        scene.add(front);

        const sourceOne = new THREE.DirectionalLight(
            0xffffff,
            effectiveLightIntensity(horizontalLightSource(), DEFAULT_HORIZONTAL_LIGHT_INTENSITY)
        );
        sourceOne.name = 'hbds-source-one-light';
        sourceOne.position.copy(directionToVector(horizontalLightSource().direction));
        scene.add(sourceOne);

        const sourceTwo = new THREE.DirectionalLight(
            0xffffff,
            effectiveLightIntensity(verticalLightSource(), DEFAULT_VERTICAL_LIGHT_INTENSITY)
        );
        sourceTwo.name = 'hbds-source-two-light';
        sourceTwo.position.copy(directionToVector(verticalLightSource().direction));
        scene.add(sourceTwo);
        sceneLights = { ambient, front, sourceOne, sourceTwo };
    }

    function applySceneSettings(options = {}) {
        if (scene) scene.background = new THREE.Color(lightingState.background);
        if (sceneLights.ambient) sceneLights.ambient.intensity = lightingState.ambient;
        if (sceneLights.front) sceneLights.front.intensity = lightingState.front;
        if (sceneLights.sourceOne) {
            sceneLights.sourceOne.intensity = effectiveLightIntensity(horizontalLightSource(), DEFAULT_HORIZONTAL_LIGHT_INTENSITY);
            sceneLights.sourceOne.visible = sceneLights.sourceOne.intensity > 0;
            sceneLights.sourceOne.position.copy(directionToVector(horizontalLightSource().direction));
        }
        if (sceneLights.sourceTwo) {
            sceneLights.sourceTwo.intensity = effectiveLightIntensity(verticalLightSource(), DEFAULT_VERTICAL_LIGHT_INTENSITY);
            sceneLights.sourceTwo.visible = sceneLights.sourceTwo.intensity > 0;
            sceneLights.sourceTwo.position.copy(directionToVector(verticalLightSource().direction));
        }
        if (options.syncControls) syncSceneSettingsControls();
        renderOnce();
    }

    function directionToVector(direction = {}) {
        return new THREE.Vector3(direction.x ?? 0, direction.y ?? 0, direction.z ?? 1);
    }

    function syncSceneSettingsControls() {
        const bind = (id, value) => {
            const input = document.getElementById(id);
            if (input) input.value = String(value);
        };
        const horizontal = horizontalLightSource();
        const vertical = verticalLightSource();
        bind('horizontal-light-intensity-input', horizontal.intensity);
        bind('horizontal-light-angle-input', horizontalLightAngleFromDirection(horizontal.direction));
        bind('vertical-light-intensity-input', vertical.intensity);
        bind('vertical-light-angle-input', verticalLightAngleFromDirection(vertical.direction));
        updateHorizontalLightAngleValue();
        updateVerticalLightAngleValue();
    }

    function updateHorizontalLightAngleValue(angle = horizontalLightAngleFromDirection(horizontalLightSource().direction)) {
        const output = document.getElementById('horizontal-light-angle-value');
        if (!output) return;
        const label = `${Math.round(normalizeLightAngle(angle))}deg`;
        output.value = label;
        output.textContent = label;
    }

    function updateVerticalLightAngleValue(angle = verticalLightAngleFromDirection(verticalLightSource().direction)) {
        const output = document.getElementById('vertical-light-angle-value');
        if (!output) return;
        const label = `${Math.round(normalizeLightAngle(angle))}deg`;
        output.value = label;
        output.textContent = label;
    }

    function readSceneSettingsControls() {
        const numberValue = (id, fallback) => {
            const value = Number(document.getElementById(id)?.value);
            return Number.isFinite(value) ? value : fallback;
        };
        const currentHorizontal = horizontalLightSource();
        const currentVertical = verticalLightSource();
        const horizontalAngle = normalizeLightAngle(numberValue(
            'horizontal-light-angle-input',
            horizontalLightAngleFromDirection(currentHorizontal.direction)
        ));
        const verticalAngle = normalizeLightAngle(numberValue(
            'vertical-light-angle-input',
            verticalLightAngleFromDirection(currentVertical.direction)
        ));
        const horizontalIntensity = clampNumber(
            numberValue('horizontal-light-intensity-input', currentHorizontal.intensity),
            0,
            2,
            DEFAULT_HORIZONTAL_LIGHT_INTENSITY
        );
        const verticalIntensity = clampNumber(
            numberValue('vertical-light-intensity-input', currentVertical.intensity),
            0,
            2,
            DEFAULT_VERTICAL_LIGHT_INTENSITY
        );
        lightingState = normalizeSimplifiedSceneSettings({
            background: lightingState.background,
            ambient: 0,
            front: 0,
            sources: [
                { intensity: horizontalIntensity, direction: horizontalLightDirectionFromAngle(horizontalAngle) },
                { intensity: verticalIntensity, direction: verticalLightDirectionFromAngle(verticalAngle) }
            ]
        });
        updateHorizontalLightAngleValue(horizontalAngle);
        updateVerticalLightAngleValue(verticalAngle);
    }

    function handleSceneSettingInput() {
        readSceneSettingsControls();
        setSceneSettings(lightingState, { applyContext: false });
        applySceneSettings();
    }

    function handleResetSceneSettings() {
        lightingState = normalizeSimplifiedSceneSettings(defaultLightingState);
        setSceneSettings(lightingState, { applyContext: false });
        applySceneSettings({ syncControls: true });
    }

    function bindSceneSettingsControls() {
        [
            'horizontal-light-intensity-input',
            'horizontal-light-angle-input',
            'vertical-light-intensity-input',
            'vertical-light-angle-input'
        ].forEach(id => document.getElementById(id)?.addEventListener('input', handleSceneSettingInput));
        document.getElementById('reset-scene-settings-button')?.addEventListener('click', handleResetSceneSettings);
    }

    function applyModelSceneSettings(settings) {
        lightingState = normalizeSimplifiedSceneSettings(settings || getSceneSettings());
        applySceneSettings({ syncControls: true });
    }

    function applyModelLayoutSettings(settings) {
        const select = document.getElementById('layout-algorithm-select');
        const algorithm = settings?.algorithm || getLayoutSettings().algorithm || 'none';
        if (select) select.value = [...select.options].some(option => option.value === algorithm) ? algorithm : 'none';
    }

    function applyModelFontSettings(settings) {
        fontState = normalizeFontSettings(settings || getFontSettings());
    }

    function setupDragControls() {
        dragControls = new DragControls(draggableObjects, camera, css2DRenderer.domElement); // unified target
        dragControls.transformGroup = false;
        let selectedObject = null;
        let selectedOrder = 1;
        let dragObjectsBackup = null;

        const setObjectRenderOrder = (object, order) => {
            object.traverse?.(child => {
                if (child.isMesh || child.isLine) {
                    child.renderOrder = order;
                }
            });
        };

        dragControls.addEventListener('dragstart', ev => {
            dragObjectsBackup = dragControls.objects.slice();
            dragControls.objects = [ev.object];
            if (selectedObject && selectedObject !== ev.object) {
                setObjectRenderOrder(selectedObject, 1);
            }
            selectedObject = ev.object;
            selectedOrder += 1;
            setObjectRenderOrder(selectedObject, selectedOrder);
            orbitControls.enabled = false;

            const is3D = document.getElementById('view-toggle').checked;
            if (!is3D) {
                ev.object.userData.dragStartZ = ev.object.position.z;
            }
        });

        dragControls.addEventListener('drag', ev => {
            const is3D = document.getElementById('view-toggle').checked;
            if (!is3D && ev.object?.userData?.dragStartZ !== undefined) {
                ev.object.position.z = ev.object.userData.dragStartZ;
            }
            recalculateAllLinks();
            updateModelOverview(getModelContext());
        });

        dragControls.addEventListener('dragend', ev => {
            if (dragObjectsBackup) dragControls.objects = dragObjectsBackup;
            if (ev.object?.userData) {
                delete ev.object.userData.dragStartZ;
            }
            orbitControls.enabled = true;
            updateModelOverview(getModelContext());
        });

        toggleView({target: document.getElementById('view-toggle')});
    }

    /* ---------- Utility functions ---------- */
    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        renderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        updateLabelFontSizes(camera, renderer);
        updateHyperClassLabelFontSizes(camera, renderer);
        updateLinkFontSizes(camera, renderer);
        updateHyperClassLinkFontSizes(camera, renderer);
        recalculateAllLinks();
        renderOnce();
        camera.updateProjectionMatrix();
        updateModelOverview(getModelContext());
    }

    function toggleView(e) {
        const is3D = e.target.checked;
        orbitControls.enableRotate = is3D;
        orbitControls.enabled = true;
        if (dragControls) dragControls.enabled = !is3D;
        if (!is3D) setCamera2D();
        updateModelOverview(getModelContext());
    }
    function setCamera2D() {
        const sphere = diagramGroup.userData.boundingSphere;
        if (!sphere || sphere.radius === 0) {
            camera.position.set(0, 0, 10);
            camera.lookAt(0, 0, 0);
            orbitControls.target.set(0, 0, 0);
            orbitControls.update();
            return;
        }
        const fovR = camera.fov * Math.PI / 180;
        const dist = Math.abs(sphere.radius / Math.sin(fovR / 2));
        camera.position.set(sphere.center.x, sphere.center.y, sphere.center.z + dist * 1.2);
        camera.lookAt(sphere.center);
        orbitControls.target.copy(sphere.center);
        orbitControls.update();
    }

    function animate() {
        requestAnimationFrame(animate);

        if (orbitControls.enabled) orbitControls.update();
        renderOnce();
    }

    /* ---------- START ---------- */
    init().catch(error => console.error(error));
    animate();
</script>
</body>
</html>
