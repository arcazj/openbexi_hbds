<!DOCTYPE html>
<html lang="en">
<head>
    <title>HDBS Graphic Simulator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="container"></div>
<div id="model-overview">
    <canvas id="model-overview-canvas"></canvas>
    <div id="model-overview-viewport"></div>
</div>
<div id="controls-panel">
    <div class="control-group">
        <label for="model-select">Select HDBS Model</label>
        <select id="model-select">
            <option value="models/human.json">human</option>
            <option value="models/human_and_car.json">human_and_car</option>
            <option value="models/human_and_car_and_more.json">human and car and more</option>
            <option value="models/transportation.json">transportation</option>
            <option value="models/transportation_links.json">transportation and links</option>
            <option value="models/human_and_car_links.json">human and car links</option>
            <option value="bridge_road_links.json">bridge road links</option>
            <option value="models/hyperclass_mail_Carrier.json">Hyperclass Mail Carrier</option>
            <option value="models/hyperclass_mail_Carrier_with_links.json">Hyperclass Mail Carrier with links</option>
            <option value="models/complex_hyperclass_mail_Carrier_with_links.json">Complex Hyperclass Mail Carrier with links</option>
            <option value="models/satellite_world_compact_structure.json">satellite world compact structure</option>
            <option value="models/satellite_world_complete_structure.json">satellite world complete structure</option>
            <option value="models/opera_de Paris.json">opera_de Paris</option>
            <option value="models/TGV.json">TGV</option>
        </select>
    </div>
    <div class="control-group">
        <label class="checkbox-wrapper" for="view-toggle">
            <input type="checkbox" id="view-toggle">
            <span>Enable 3-D View</span>
        </label>
    </div>
    <div class="control-group">
        <label class="checkbox-wrapper" for="editable-toggle">
            <input type="checkbox" id="editable-toggle" checked>
            <span>Editable mode</span>
        </label>
    </div>
    <div class="control-group">
        <button id="save-model-button">Save Model</button>
    </div>
    <div class="control-group">
        <button id="optimize-layout-button">Optimize Layout</button>
    </div>
    <div class="control-group">
        <label for="layout-algorithm-select">Layout Algorithm</label>
        <select id="layout-algorithm-select">
            <option value="grid">Grid (default)</option>
            <option value="hierarchy">Hierarchy</option>
            <option value="radial">Radial</option>
        </select>
    </div>
    <div class="control-group">
        <label class="checkbox-wrapper" for="auto-optimize-toggle">
            <input type="checkbox" id="auto-optimize-toggle">
            <span>Auto optimize on model load</span>
        </label>
    </div>
    <div class="control-group">
        <button id="fit-model-button">Fit Model</button>
    </div>
</div>
<script type="importmap">
    {
      "imports": {
        "three":         "https://unpkg.com/three@0.176.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.176.0/examples/jsm/"
      }
    }

</script>
<script type="module">
    /* ---------- Imports ---------- */
    import * as THREE from 'three';
    import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
    import {DragControls} from 'three/addons/controls/DragControls.js';
    import {CSS2DRenderer} from 'three/addons/renderers/CSS2DRenderer.js';
    import {updateLabelFontSizes} from './js/hbds_class.js';
    import {updateLabelFontSizes as updateHyperClassLabelFontSizes} from './js/hbds_hyperclass_class.js';
    import { updateLinkFontSizes, recalculateAllLinks } from './js/hbds_class_link.js';
    import { updateLinkFontSizes as updateHyperClassLinkFontSizes } from './js/hbds_hyperclass_link.js';
    import { loadAndRenderScene, saveScene, optimizeAndRefreshLayout, fitModelToCanvas, initModelOverview, updateModelOverview, setupCanvasPanControls, listAvailableModels } from './js/hbds_model.js';

    /* ---------- Globals ---------- */
    let scene, camera, renderer, css2DRenderer, orbitControls, dragControls;
    let diagramGroup = new THREE.Group();
    const draggableObjects = [];

    /* ---------- MAIN APPLICATION ---------- */
    function init() {
        bootstrapModelCatalog();
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#f0f0f0');

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        const container = document.getElementById('container');
        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        css2DRenderer = new CSS2DRenderer();
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.domElement.style.position = 'absolute';
        css2DRenderer.domElement.style.top = '0';
        container.appendChild(css2DRenderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
        keyLight.position.set(1, 2.5, 6);
        scene.add(keyLight);
        const rim = new THREE.DirectionalLight(0xffffff, 0.6);
        rim.position.set(-1, -4, -2);
        scene.add(rim);

        orbitControls = new OrbitControls(camera, css2DRenderer.domElement);
        orbitControls.enableRotate = false;
        orbitControls.addEventListener('change', () => {
            renderOnce();
            updateModelOverview(getModelContext());
        });

        window.addEventListener('resize', onResize);
        const viewToggle = document.getElementById('view-toggle');
        viewToggle.checked = false;
        viewToggle.addEventListener('change', toggleView);
        document.getElementById('save-model-button').addEventListener('click', () => {
            const selectedModelValue = document.getElementById('model-select').value;
            const fileName = selectedModelValue.endsWith('.json')
                ? selectedModelValue.split('/').pop()
                : `${selectedModelValue}.json`;

            saveScene(getModelContext(), { fileName });
        });
        document.getElementById('optimize-layout-button').addEventListener('click', async () => {
            const algorithm = document.getElementById('layout-algorithm-select').value;
            await optimizeAndRefreshLayout(getModelContext(), {
                algorithm,
                fitAfterOptimize: true
            });
            fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
        });
        document.getElementById('model-select').addEventListener('change', async e => {
            await loadAndRenderScene(e.target.value, getModelContext());
            if (document.getElementById('auto-optimize-toggle').checked) {
                await optimizeAndRefreshLayout(getModelContext(), {
                    algorithm: document.getElementById('layout-algorithm-select').value
                });
            }
            fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
        });
        document.getElementById('fit-model-button').addEventListener('click', () => {
            fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
        });
        document.getElementById('editable-toggle').addEventListener('change', toggleEditableMode);

        setupCanvasPanControls(getModelContext());
        initModelOverview(getModelContext());
        loadAndRenderScene('human', getModelContext()).then(() => {
            fitModelToCanvas(getModelContext(), { padding: 1.15, updateOverview: true });
        });
    }
    async function bootstrapModelCatalog() {
        const select = document.getElementById('model-select');
        const models = await listAvailableModels();
        if (!Array.isArray(models) || models.length === 0) return;
        select.innerHTML = '';
        models.forEach((model) => {
            const option = document.createElement('option');
            option.value = model.value;
            option.textContent = model.label;
            if (model.description) option.title = model.description;
            select.appendChild(option);
        });
    }


    function renderOnce() {
        renderer.render(scene, camera);
        css2DRenderer.render(scene, camera);
    }

    function getModelContext() {
        return {
            scene,
            camera,
            renderer,
            css2DRenderer,
            orbitControls,
            dragControls,
            diagramGroup,
            draggableObjects,
            setDiagramGroup: group => { diagramGroup = group; },
            setDragControls: controls => { dragControls = controls; },
            setupDragControls,
            setCamera2D,
            renderOnce
        };
    }

    function setupDragControls() {
        dragControls = new DragControls(draggableObjects, camera, css2DRenderer.domElement); // unified target
        dragControls.transformGroup = false;
        let selectedObject = null;
        let selectedOrder = 1;
        let dragObjectsBackup = null;

        const setObjectRenderOrder = (object, order) => {
            object.traverse?.(child => {
                if (child.isMesh || child.isLine) {
                    child.renderOrder = order;
                }
            });
        };

        dragControls.addEventListener('dragstart', ev => {
            dragObjectsBackup = dragControls.objects.slice();
            dragControls.objects = [ev.object];
            if (selectedObject && selectedObject !== ev.object) {
                setObjectRenderOrder(selectedObject, 1);
            }
            selectedObject = ev.object;
            selectedOrder += 1;
            setObjectRenderOrder(selectedObject, selectedOrder);
            orbitControls.enabled = false;

            const is3D = document.getElementById('view-toggle').checked;
            if (!is3D) {
                ev.object.userData.dragStartZ = ev.object.position.z;
            }
        });

        dragControls.addEventListener('drag', ev => {
            const is3D = document.getElementById('view-toggle').checked;
            if (!is3D && ev.object?.userData?.dragStartZ !== undefined) {
                ev.object.position.z = ev.object.userData.dragStartZ;
            }
            recalculateAllLinks();
            updateModelOverview(getModelContext());
        });

        dragControls.addEventListener('dragend', ev => {
            if (dragObjectsBackup) dragControls.objects = dragObjectsBackup;
            if (ev.object?.userData) {
                delete ev.object.userData.dragStartZ;
            }
            orbitControls.enabled = true;
            updateModelOverview(getModelContext());
        });

        toggleView({target: document.getElementById('view-toggle')});
    }

    /* ---------- Utility functions ---------- */
    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        renderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        updateLabelFontSizes(camera);
        updateHyperClassLabelFontSizes(camera, renderer);
        updateLinkFontSizes(camera);
        updateHyperClassLinkFontSizes(camera, renderer);
        recalculateAllLinks();
        renderOnce();
        camera.updateProjectionMatrix();
        updateModelOverview(getModelContext());
    }

    function toggleView(e) {
        const is3D = e.target.checked;
        orbitControls.enableRotate = is3D;
        orbitControls.enabled = true;
        if (dragControls) dragControls.enabled = !is3D;
        if (!is3D) setCamera2D();
        updateModelOverview(getModelContext());
    }
    function toggleEditableMode(e) {
        const editable = e.target.checked;
        if (dragControls) dragControls.enabled = editable && !document.getElementById('view-toggle').checked;
        orbitControls.enabled = !editable;
    }

    function setCamera2D() {
        const sphere = diagramGroup.userData.boundingSphere;
        if (!sphere || sphere.radius === 0) {
            camera.position.set(0, 0, 10);
            camera.lookAt(0, 0, 0);
            orbitControls.target.set(0, 0, 0);
            orbitControls.update();
            return;
        }
        const fovR = camera.fov * Math.PI / 180;
        const dist = Math.abs(sphere.radius / Math.sin(fovR / 2));
        camera.position.set(sphere.center.x, sphere.center.y, sphere.center.z + dist * 1.2);
        camera.lookAt(sphere.center);
        orbitControls.target.copy(sphere.center);
        orbitControls.update();
    }

    function animate() {
        requestAnimationFrame(animate);

        if (orbitControls.enabled) orbitControls.update();
        renderOnce();
    }

    /* ---------- START ---------- */
    init();
    animate();
</script>
</body>
</html>
