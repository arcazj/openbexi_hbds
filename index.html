<!DOCTYPE html>
<html lang="en">
<head>
    <title>HDBS Graphic Simulator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="container"></div>
<div id="model-overview">
    <canvas id="model-overview-canvas"></canvas>
    <div id="model-overview-viewport"></div>
</div>
<div id="controls-panel">
    <div class="control-group">
        <label for="model-select">Select HDBS Model</label>
        <select id="model-select">
            <option value="human">human</option>
            <option value="human_and_car">human_and_car</option>
            <option value="human_and_car_and_more">human_and_car_and_more</option>
            <option value="transportation">transportation</option>
            <option value="human_and_car_links">human_and_car_links</option>
            <option value="bridge_road_links">bridge_road_links</option>
            <option value="models/hyperclass_mail_Carrier.json">Hyperclass Mail Carrier</option>
            <option value="models/hyperclass_mail_Carrier_with_links.json">Hyperclass Mail Carrier with links</option>
            <option value="models/complex_hyperclass_mail_Carrier_with_links.json">Complex Hyperclass Mail Carrier with links</option>
        </select>
    </div>
    <div class="control-group">
        <label class="checkbox-wrapper" for="view-toggle">
            <input type="checkbox" id="view-toggle">
            <span>Enable 3-D View</span>
        </label>
    </div>
    <div class="control-group">
        <button id="save-model-button">Save Model</button>
    </div>
    <div class="control-group">
        <button id="optimize-layout-button">Optimize Layout</button>
    </div>
    <div class="control-group">
        <button id="fit-model-button">Fit Model</button>
    </div>
</div>
<script type="importmap">
    {
      "imports": {
        "three":         "https://unpkg.com/three@0.176.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.176.0/examples/jsm/"
      }
    }

</script>
<script type="module">
    /* ---------- Imports ---------- */
    import * as THREE from 'three';
    import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
    import {DragControls} from 'three/addons/controls/DragControls.js';
    import {CSS2DRenderer} from 'three/addons/renderers/CSS2DRenderer.js';
    import {updateLabelFontSizes} from './js/hbds_class.js';
    import {updateLabelFontSizes as updateHyperClassLabelFontSizes} from './js/hbds_hyperclass_class.js';
    import { updateLinkFontSizes, recalculateAllLinks } from './js/hbds_class_link.js';
    import { updateLinkFontSizes as updateHyperClassLinkFontSizes } from './js/hbds_hyperclass_link.js';
    import { loadAndRenderScene, saveScene, optimizeAndRefreshLayout, refreshDiagramBoundsAndCamera, updateModelOverview, setupCanvasPanControls } from './js/hbds_model.js';

    /* ---------- Globals ---------- */
    let scene, camera, renderer, css2DRenderer, orbitControls, dragControls;
    let diagramGroup = new THREE.Group();
    const draggableObjects = [];

    /* ---------- MAIN APPLICATION ---------- */
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#f0f0f0');

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        const container = document.getElementById('container');
        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        css2DRenderer = new CSS2DRenderer();
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.domElement.style.position = 'absolute';
        css2DRenderer.domElement.style.top = '0';
        container.appendChild(css2DRenderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
        keyLight.position.set(1, 2.5, 6);
        scene.add(keyLight);
        const rim = new THREE.DirectionalLight(0xffffff, 0.6);
        rim.position.set(-1, -4, -2);
        scene.add(rim);

        orbitControls = new OrbitControls(camera, css2DRenderer.domElement);
        orbitControls.enableRotate = false;

        window.addEventListener('resize', onResize);
        document.getElementById('view-toggle').addEventListener('change', toggleView);
        document.getElementById('save-model-button').addEventListener('click', () => {
            const selectedModelValue = document.getElementById('model-select').value;
            const fileName = selectedModelValue.endsWith('.json')
                ? selectedModelValue.split('/').pop()
                : `${selectedModelValue}.json`;

            saveScene(getModelContext(), { fileName });
        });
        document.getElementById('optimize-layout-button').addEventListener('click', async () => {
            await optimizeAndRefreshLayout(getModelContext(), {
                modelName: document.getElementById('model-select').value
            });
        });
        document.getElementById('model-select').addEventListener('change', e => {
            loadAndRenderScene(e.target.value, getModelContext());
        });
        document.getElementById('fit-model-button').addEventListener('click', () => {
            refreshDiagramBoundsAndCamera(getModelContext(), { fitToView: true, padding: 1.25 });
        });

        setupCanvasPanControls(getModelContext());
        loadAndRenderScene('human', getModelContext());
    }


    function renderOnce() {
        renderer.render(scene, camera);
        css2DRenderer.render(scene, camera);
    }

    function getModelContext() {
        return {
            scene,
            camera,
            renderer,
            css2DRenderer,
            orbitControls,
            dragControls,
            diagramGroup,
            draggableObjects,
            setDiagramGroup: group => { diagramGroup = group; },
            setDragControls: controls => { dragControls = controls; },
            setupDragControls,
            setCamera2D,
            renderOnce
        };
    }

    function setupDragControls() {
        dragControls = new DragControls(draggableObjects, camera, css2DRenderer.domElement); // unified target
        dragControls.transformGroup = false;

        dragControls.addEventListener('dragstart', ev => {
            orbitControls.enabled = false;
        });

        dragControls.addEventListener('drag', () => {
            recalculateAllLinks();
        });

        dragControls.addEventListener('dragend', () => {
            const is3D = document.getElementById('view-toggle').checked;
            orbitControls.enabled = !is3D;
        });

        toggleView({target: document.getElementById('view-toggle')});
    }

    /* ---------- Utility functions ---------- */
    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        renderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        updateLabelFontSizes(camera);
        updateHyperClassLabelFontSizes(camera, renderer);
        updateLinkFontSizes(camera);
        updateHyperClassLinkFontSizes(camera, renderer);
        recalculateAllLinks();
        renderOnce();
        camera.updateProjectionMatrix();
        updateModelOverview(getModelContext());
    }

    function toggleView(e) {
        const is3D = e.target.checked;
        orbitControls.enableRotate = is3D;
        orbitControls.enabled = true;
        if (dragControls) dragControls.enabled = !is3D;
        if (!is3D) setCamera2D();
        updateModelOverview(getModelContext());
    }

    function setCamera2D() {
        const sphere = diagramGroup.userData.boundingSphere;
        if (!sphere || sphere.radius === 0) {
            camera.position.set(0, 0, 10);
            camera.lookAt(0, 0, 0);
            orbitControls.target.set(0, 0, 0);
            orbitControls.update();
            return;
        }
        const fovR = camera.fov * Math.PI / 180;
        const dist = Math.abs(sphere.radius / Math.sin(fovR / 2));
        camera.position.set(0, 0, dist * 1.2);
        camera.lookAt(0, 0, 0);
        orbitControls.target.set(0, 0, 0);
        orbitControls.update();
    }

    function animate() {
        requestAnimationFrame(animate);

        if (orbitControls.enabled) orbitControls.update();
        renderOnce();
    }

    /* ---------- START ---------- */
    init();
    animate();
</script>
</body>
</html>
