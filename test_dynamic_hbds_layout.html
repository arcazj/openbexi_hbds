<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBDS Dynamic Layout Test</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --panel-width: 400px;
      --panel-height: 44vh;
      --ink: var(--hbds-menu-ink);
      --muted: var(--hbds-menu-muted);
      --line: var(--hbds-menu-line);
      --surface: var(--hbds-menu-surface);
      --surface-soft: var(--hbds-menu-surface-soft);
      --accent: var(--hbds-menu-accent);
      --accent-strong: var(--hbds-menu-accent-strong);
      --on-accent: var(--hbds-menu-on-accent);
      --summary-bg: var(--hbds-menu-summary-bg);
      --summary-open-bg: var(--hbds-menu-summary-open-bg);
      --collapsed-bg: var(--hbds-menu-collapsed-bg);
      --collapsed-ink: var(--hbds-menu-collapsed-ink);
      --control-bg: var(--hbds-menu-control-bg);
      --danger: var(--hbds-menu-danger);
      --ok: var(--hbds-menu-ok);
      --warn: var(--hbds-menu-warn);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      background: var(--hbds-menu-page-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    button,
    select,
    textarea,
    input {
      font: inherit;
    }

    button,
    select,
    textarea {
      width: 100%;
    }

    input[type="text"] {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #ffffff;
      padding: 7px 9px;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #ffffff;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;
    }

    button:hover:not(:disabled) {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled,
    select:disabled,
    textarea:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    button.primary {
      border-color: var(--accent);
      color: #ffffff;
      background: var(--accent);
    }

    button.primary:hover:not(:disabled) {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
    }

    button.danger {
      border-color: #f1c6c1;
      color: var(--danger);
      background: #fff8f7;
    }

    button.quiet {
      color: #334155;
      background: var(--surface-soft);
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      font-weight: 650;
      color: #333;
    }

    select,
    textarea {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #ffffff;
      padding: 7px 9px;
    }

    input[type="color"] {
      width: 44px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 3px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    textarea {
      min-height: 210px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    #container {
      position: fixed;
      inset: 0 var(--panel-width) 0 0;
      overflow: hidden;
      background: #f8fafc;
    }

    #container canvas {
      display: block;
    }

    #canvas-model-title {
      position: absolute;
      top: 14px;
      left: 50%;
      z-index: 18;
      max-width: calc(100% - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 20px;
      font-weight: 780;
      color: #333;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 6px 12px;
      backdrop-filter: blur(3px);
      display: none;
      transform: translateX(-50%);
    }

    body.has-model #canvas-model-title {
      display: inline-block;
    }

    .label-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .label {
      border-radius: 6px;
      padding: 1px 4px;
      pointer-events: auto;
      cursor: pointer;
      transition: background 140ms ease, box-shadow 140ms ease;
    }

    .label.is-selected {
      background: #f8fafc;
      box-shadow: 0 0 0 1px #cbd5e1;
    }

    .attribute-label.is-selected,
    .link-label.is-selected {
      outline: 2px solid #cbd5e1;
      outline-offset: 2px;
    }

    .control-row,
    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    #model-overview {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      width: 224px;
      height: 150px;
      overflow: hidden;
      border: 1px solid #999;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 14px 34px rgba(40, 54, 72, 0.14);
    }

    #model-overview-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #model-overview-viewport {
      position: absolute;
      border: 1px solid #999;
      background: rgba(248, 250, 252, 0.72);
      pointer-events: auto;
    }

    #dynamic-test-panel {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 30;
      width: var(--panel-width);
      height: 100%;
      overflow: auto;
      border-left: 1px solid #ddd;
      background: var(--hbds-menu-panel-bg);
      box-shadow: -18px 0 48px rgba(40, 54, 72, 0.1);
      padding: 16px;
    }

    .panel-header {
      display: grid;
      gap: 4px;
      margin-bottom: 10px;
    }

    .eyebrow {
      color: #64748b;
      font-size: 12px;
      font-weight: 750;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      min-height: 56px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }

    .stat-value {
      display: block;
      font-size: 18px;
      font-weight: 750;
      line-height: 1.1;
      color: #333;
    }

    .stat-label {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .status-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status-chip.ok {
      border-color: #b7e4c7;
      color: var(--ok);
      background: #f1fbf5;
    }

    .status-chip.warn {
      border-color: #f7d89d;
      color: var(--warn);
      background: #fff8e8;
    }

    .status-chip.error {
      border-color: #f3b8b0;
      color: var(--danger);
      background: #fff5f3;
    }

    .control-group {
      --group-accent: var(--hbds-menu-accent);
      --group-border: var(--hbds-menu-line);
      --group-bg: var(--hbds-menu-surface-soft);
      --group-bg-strong: var(--hbds-menu-surface-soft);
      --group-control-bg: var(--hbds-menu-surface-soft);
      --group-summary-bg: var(--summary-bg);
      --group-summary-open-bg: var(--summary-open-bg);
      --group-collapsed-bg: var(--collapsed-bg);
      --group-collapsed-ink: var(--collapsed-ink);
      display: grid;
      gap: 9px;
      margin-bottom: 10px;
      border: 1px solid var(--group-border);
      border-left: 4px solid var(--group-accent);
      border-radius: 8px;
      background: linear-gradient(135deg, var(--group-bg-strong) 0%, var(--group-summary-bg) 100%);
      padding: 10px;
    }

    details.control-group {
      display: block;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(135deg, var(--group-bg-strong) 0%, var(--group-summary-bg) 100%);
    }

    details.control-group > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 36px;
      cursor: pointer;
      list-style: none;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 760;
      color: var(--group-accent);
      background: linear-gradient(90deg, var(--group-bg-strong), var(--group-summary-bg));
    }

    details.control-group > summary::-webkit-details-marker {
      display: none;
    }

    details.control-group > summary::after {
      content: "+";
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      color: var(--group-accent);
      background: var(--group-bg-strong);
      font-size: 16px;
      line-height: 1;
      text-align: center;
    }

    details.control-group[open] > summary {
      background: linear-gradient(90deg, var(--group-bg-strong) 0%, var(--group-summary-open-bg) 100%);
    }

    details.control-group[open] > summary::after {
      content: "-";
    }

    details.control-group:not([open]) > summary {
      color: var(--group-accent);
      background: linear-gradient(90deg, var(--group-collapsed-bg) 0%, var(--group-summary-bg) 100%);
      box-shadow: inset 4px 0 0 var(--group-accent);
    }

    details.control-group:not([open]) > summary::after {
      color: var(--on-accent);
      background: var(--group-accent);
    }

    details.control-group > .details-body {
      display: grid;
      gap: 9px;
      border-top: 1px solid var(--group-border);
      background: linear-gradient(160deg, var(--group-bg-strong) 0%, var(--group-summary-open-bg) 100%);
      padding: 10px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 1px;
      font-size: 13px;
      font-weight: 760;
      color: var(--group-accent);
    }

    .control-group label {
      color: #333;
    }

    .control-group select,
    .control-group textarea,
    .control-group input[type="text"] {
      border-color: var(--group-border);
      background: var(--control-bg);
    }

    .control-group button:not(.primary):not(.danger):not(.quiet) {
      border-color: var(--group-border);
      background: var(--control-bg);
    }

    .control-group button:not(.primary):not(.danger):not(.quiet):hover:not(:disabled) {
      border-color: var(--group-accent);
      color: var(--accent);
      background: var(--group-bg-strong);
    }

    details.control-group > summary .section-title {
      width: 100%;
      margin: 0;
    }

    .control-group[data-section="model"] {
      --group-accent: var(--hbds-menu-model-accent);
      --group-bg-strong: var(--hbds-menu-model-soft);
      --group-collapsed-bg: var(--hbds-menu-model-soft);
    }

    .control-group[data-section="scenario-suite"] {
      --group-accent: var(--hbds-menu-layout-accent);
      --group-bg-strong: var(--hbds-menu-layout-soft);
      --group-collapsed-bg: var(--hbds-menu-layout-soft);
    }

    .control-group[data-section="mode"] {
      --group-accent: var(--hbds-menu-mode-accent);
      --group-bg-strong: var(--hbds-menu-mode-soft);
      --group-collapsed-bg: var(--hbds-menu-mode-soft);
    }

    .control-group[data-section="layout-session"] {
      --group-accent: var(--hbds-menu-layout-accent);
      --group-bg-strong: var(--hbds-menu-layout-soft);
      --group-collapsed-bg: var(--hbds-menu-layout-soft);
    }

    .control-group[data-section="model-builder"] {
      --group-accent: var(--hbds-menu-builder-accent);
      --group-bg-strong: var(--hbds-menu-builder-soft);
      --group-collapsed-bg: var(--hbds-menu-builder-soft);
    }

    .control-group[data-section="settings"] {
      --group-accent: var(--hbds-menu-settings-accent);
      --group-bg-strong: var(--hbds-menu-settings-soft);
      --group-collapsed-bg: var(--hbds-menu-settings-soft);
    }

    .control-group[data-section="json"] {
      --group-accent: var(--hbds-menu-json-accent);
      --group-bg-strong: var(--hbds-menu-json-soft);
      --group-collapsed-bg: var(--hbds-menu-json-soft);
    }

    .control-group[data-section="session"] {
      --group-accent: var(--hbds-menu-session-accent);
      --group-bg-strong: var(--hbds-menu-session-soft);
      --group-collapsed-bg: var(--hbds-menu-session-soft);
    }

    .section-meta,
    .inline-hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .builder-separator {
      height: 1px;
      margin: 2px 0;
      background: #ddd;
    }

    .link-builder-actions {
      display: none;
    }

    .link-builder-actions.is-active {
      display: grid;
    }

    .mode-segment {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 3px;
      border: 1px solid var(--group-border);
      border-radius: 8px;
      background: var(--group-bg-strong);
    }

    .mode-segment button {
      min-height: 30px;
      border-color: transparent;
      background: transparent;
      font-size: 12px;
    }

    .mode-segment button.active {
      border-color: #cbd5e1;
      color: var(--accent);
      background: #f7fbff;
      box-shadow: 0 1px 3px rgba(40, 54, 72, 0.1);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 34px;
      border: 1px solid var(--group-border);
      border-radius: 8px;
      background: var(--group-control-bg);
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 650;
    }

    .toggle-row input {
      width: auto;
      margin: 0;
    }

    .inline-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 34px;
      border: 1px solid var(--group-border);
      border-radius: 8px;
      background: var(--group-control-bg);
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 650;
    }

    .inline-field span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .range-field {
      display: grid;
      grid-template-columns: minmax(92px, 0.9fr) minmax(120px, 1.1fr);
      align-items: center;
      gap: 8px;
      min-height: 32px;
      font-size: 12px;
      font-weight: 650;
    }

    .settings-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .selected-card {
      display: grid;
      gap: 3px;
      min-height: 50px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      padding: 9px;
    }

    .selected-name {
      overflow-wrap: anywhere;
      font-weight: 750;
    }

    .selected-meta {
      overflow-wrap: anywhere;
      color: var(--muted);
      font-size: 12px;
    }

    .property-panel {
      display: grid;
      gap: 8px;
      margin-top: 2px;
      border-top: 1px solid var(--group-border);
      padding-top: 10px;
    }

    .property-panel-title {
      color: var(--group-accent);
      font-size: 13px;
      font-weight: 800;
    }

    .inspector-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 2px;
    }

    .inspector-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .inspector-actions {
      display: inline-flex;
      gap: 6px;
      flex: 0 0 auto;
    }

    .inspector-icon-button,
    .inspector-reset-button {
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 7px;
      font-size: 11px;
    }

    .property-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .property-group {
      display: grid;
      gap: 8px;
      margin: 0;
      border: 1px solid var(--group-border);
      border-radius: 8px;
      background: var(--group-control-bg);
      padding: 8px;
    }

    .property-group legend {
      padding: 0 5px;
      color: #64748b;
      font-size: 11px;
      font-weight: 760;
    }

    .property-row {
      display: grid;
      grid-template-columns: minmax(96px, 0.85fr) minmax(0, 1.15fr);
      align-items: center;
      gap: 8px;
      min-height: 32px;
      color: #333;
      font-size: 12px;
      font-weight: 650;
    }

    .property-row input[type="text"],
    .property-row input[type="number"],
    .property-row select {
      width: 100%;
      min-height: 32px;
      border: 1px solid var(--group-border);
      border-radius: 8px;
      color: var(--ink);
      background: var(--control-bg);
      padding: 6px 8px;
      font: inherit;
      font-weight: 500;
    }

    .property-row input[type="checkbox"] {
      justify-self: start;
      width: auto;
      margin: 0;
    }

    .property-row input[type="color"] {
      justify-self: start;
    }

    .inspector-section {
      border: 1px solid var(--group-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.35);
      overflow: hidden;
    }

    .inspector-section > summary {
      cursor: pointer;
      list-style: none;
      padding: 8px 10px;
      color: var(--group-accent);
      background: linear-gradient(90deg, var(--group-bg-strong), rgba(255, 255, 255, 0.45));
      font-size: 12px;
      font-weight: 800;
    }

    .inspector-section > summary::-webkit-details-marker {
      display: none;
    }

    .inspector-section-body {
      display: grid;
      gap: 9px;
      padding: 10px;
    }

    .inspector-row {
      display: grid;
      grid-template-columns: minmax(86px, 0.72fr) minmax(0, 1.28fr);
      align-items: center;
      gap: 9px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 680;
    }

    .inspector-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .inspector-control > input[type="text"],
    .inspector-control > input[type="number"],
    .inspector-control > select,
    .inspector-control > textarea,
    .color-control input[type="text"],
    .slider-number-control input[type="number"] {
      width: 100%;
      min-height: 32px;
      border: 1px solid var(--group-border);
      border-radius: 8px;
      color: var(--ink);
      background: var(--control-bg);
      padding: 6px 8px;
      font: inherit;
      font-weight: 520;
    }

    .inspector-control > textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.35;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      grid-column: 1 / -1;
    }

    .slider-number-control {
      display: grid;
      grid-template-columns: minmax(72px, 1fr) 68px;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .slider-number-control input[type="range"] {
      width: 100%;
      accent-color: var(--group-accent);
    }

    .color-control {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .color-control input[type="color"] {
      width: 42px;
      height: 32px;
      border: 1px solid var(--group-border);
      border-radius: 8px;
      background: var(--control-bg);
      padding: 3px;
      cursor: pointer;
    }

    .recent-colors {
      display: flex;
      grid-column: 1 / -1;
      gap: 5px;
      min-height: 0;
    }

    .recent-colors:empty {
      display: none;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      min-height: 20px;
      border: 1px solid rgba(15, 23, 42, 0.22);
      border-radius: 999px;
      padding: 0;
    }

    .inspector-control input[type="checkbox"] {
      justify-self: start;
      width: auto;
      margin: 0;
      accent-color: var(--group-accent);
    }

    .danger-zone {
      margin-top: 2px;
      padding-top: 10px;
      border-top: 1px solid #f1c6c1;
    }

    #layout-status {
      min-height: 112px;
      margin: 0;
      overflow: auto;
      border: 1px solid #263241;
      border-radius: 8px;
      background: #111827;
      color: #d9fbe7;
      padding: 9px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    #toast {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 45;
      max-width: min(420px, calc(100% - var(--panel-width) - 48px));
      min-height: 34px;
      padding: 9px 12px;
      border: 1px solid rgba(84, 96, 112, 0.22);
      border-radius: 8px;
      background: rgba(24, 32, 42, 0.94);
      color: #ffffff;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    #toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
      padding: 0;
    }

    @media (max-width: 900px) {
      #container {
        inset: 0 0 var(--panel-height) 0;
      }

      #dynamic-test-panel {
        top: auto;
        bottom: 0;
        width: 100%;
        height: var(--panel-height);
        border-top: 1px solid #ddd;
        border-left: 0;
        box-shadow: 0 -18px 48px rgba(40, 54, 72, 0.12);
      }

      #model-overview {
        width: 168px;
        height: 112px;
      }

      #toast {
        max-width: calc(100% - 36px);
        bottom: calc(var(--panel-height) + 14px);
      }
    }
  </style>
  <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.176.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.176.0/examples/jsm/"}}</script>
</head>
<body>
  <main id="container">
    <div id="canvas-model-title" aria-live="polite"></div>
  </main>

  <div id="model-overview" aria-label="Model overview">
    <canvas id="model-overview-canvas"></canvas>
    <div id="model-overview-viewport"></div>
  </div>

  <aside id="dynamic-test-panel" aria-label="HBDS dynamic controls">
    <header class="panel-header">
      <div class="eyebrow">HBDS Lab</div>
      <h1>Dynamic Layout Test</h1>
    </header>

    <div class="stats-grid" aria-label="Model statistics">
      <div class="stat"><span class="stat-value" id="stat-node-count">0</span><span class="stat-label">Nodes</span></div>
      <div class="stat"><span class="stat-value" id="stat-link-count">0</span><span class="stat-label">Links</span></div>
      <div class="stat"><span class="stat-value" id="stat-attribute-count">0</span><span class="stat-label">Attrs</span></div>
      <div class="stat"><span class="stat-value" id="stat-hyperclass-count">0</span><span class="stat-label">Groups</span></div>
    </div>
    <div id="validation-status" class="status-chip">No model loaded</div>

    <section class="control-group" data-default-open="true" data-section="scenario-suite">
      <div class="section-title">Scenario Suite</div>
      <button id="run-scenario-suite-button" type="button" class="quiet">Run Scenario Suite</button>
      <div id="scenario-status" class="status-chip">Scenario suite idle</div>
    </section>

    <section class="control-group" data-default-open="true">
      <div class="section-title">Model</div>
      <label for="test-model-select">Select a HBDS Model</label>
      <select id="test-model-select">
        <option value="">Blank workspace</option>
      </select>
      <div id="model-summary" class="section-meta">Blank workspace</div>
    </section>

    <section class="control-group">
      <div class="section-title">Mode</div>
      <label class="sr-only" for="edit-mode-select">Editable Mode</label>
      <select id="edit-mode-select" class="sr-only">
        <option value="full">Full Edit</option>
        <option value="structure">Structure Only</option>
        <option value="readonly">Read Only</option>
      </select>
      <div class="mode-segment" role="group" aria-label="Edit mode">
        <button id="mode-full" type="button">Full</button>
        <button id="mode-structure" type="button">Structure</button>
        <button id="mode-readonly" type="button">Read Only</button>
      </div>
      <div class="two-col">
        <label class="toggle-row" for="auto-optimize-toggle"><span>Auto Layout</span><input type="checkbox" id="auto-optimize-toggle" checked></label>
        <label class="toggle-row" for="auto-fit-toggle"><span>Auto Fit</span><input type="checkbox" id="auto-fit-toggle" checked></label>
      </div>
    </section>

    <section class="control-group">
      <div class="section-title">Layout Session</div>
      <label for="layout-algorithm-select">Algorithm</label>
      <select id="layout-algorithm-select">
        <option value="none">None</option>
        <option value="grid">Grid</option>
        <option value="hierarchy">Hierarchy</option>
        <option value="radial">Radial</option>
      </select>
      <div class="control-row">
        <button id="optimize-layout-button" type="button">Optimize</button>
        <button id="fit-model-button" type="button">Fit View</button>
      </div>
    </section>

    <section class="control-group">
      <div class="section-title">Model Builder <span id="link-builder-status" class="section-meta">Ready</span></div>
      <div class="action-grid">
        <button id="add-hyperclass-button" type="button" class="primary">Hyperclass</button>
        <button id="add-class-button" type="button">Class</button>
        <button id="add-attribute-button" type="button">Attribute</button>
        <button id="add-link-button" type="button">Link</button>
      </div>
      <div id="link-builder-actions" class="control-row link-builder-actions">
        <button id="cancel-link-button" type="button" class="quiet">Cancel Link</button>
      </div>
      <div class="builder-separator" aria-hidden="true"></div>
      <div id="selected-card" class="selected-card">
        <span class="selected-name">No selection</span>
        <span class="selected-meta">Select a class or hyperclass</span>
      </div>
      <label for="parent-hyperclass-select">Parent Selected</label>
      <select id="parent-hyperclass-select"></select>
      <label for="selected-element-select">Selected Element</label>
      <select id="selected-element-select"></select>
      <label for="selected-name-input">Element Name</label>
      <input id="selected-name-input" type="text" autocomplete="off" placeholder="Select an element">
      <label for="selected-attribute-select">Attribute</label>
      <select id="selected-attribute-select"></select>
      <label for="selected-link-select">Link</label>
      <select id="selected-link-select"></select>
      <div id="property-panel" class="property-panel" aria-live="polite"></div>
      <div class="danger-zone">
        <button id="delete-selected-button" type="button" class="danger">Delete Selected</button>
      </div>
    </section>

    <section class="control-group" data-default-open="false">
      <div class="section-title">Settings</div>
      <label class="inline-field" for="scene-background-input"><span>Background</span><input type="color" id="scene-background-input" value="#eef2f6"></label>
      <label class="range-field" for="ambient-light-input"><span>Ambient</span><input type="range" id="ambient-light-input" min="0" max="1.5" step="0.01" value="0.82"></label>
      <label class="range-field" for="front-light-input"><span>Front Light</span><input type="range" id="front-light-input" min="0" max="1.5" step="0.01" value="0.16"></label>
      <div class="settings-subtitle">Source 1</div>
      <label class="range-field" for="source-one-intensity-input"><span>Intensity</span><input type="range" id="source-one-intensity-input" min="0" max="1.5" step="0.01" value="0.14"></label>
      <label class="range-field" for="source-one-x-input"><span>X</span><input type="range" id="source-one-x-input" min="-20" max="20" step="0.1" value="-5"></label>
      <label class="range-field" for="source-one-y-input"><span>Y</span><input type="range" id="source-one-y-input" min="-20" max="20" step="0.1" value="7"></label>
      <label class="range-field" for="source-one-z-input"><span>Z</span><input type="range" id="source-one-z-input" min="-20" max="30" step="0.1" value="13"></label>
      <div class="settings-subtitle">Source 2</div>
      <label class="range-field" for="source-two-intensity-input"><span>Intensity</span><input type="range" id="source-two-intensity-input" min="0" max="1.5" step="0.01" value="0.10"></label>
      <label class="range-field" for="source-two-x-input"><span>X</span><input type="range" id="source-two-x-input" min="-20" max="20" step="0.1" value="8"></label>
      <label class="range-field" for="source-two-y-input"><span>Y</span><input type="range" id="source-two-y-input" min="-20" max="20" step="0.1" value="-6"></label>
      <label class="range-field" for="source-two-z-input"><span>Z</span><input type="range" id="source-two-z-input" min="-20" max="30" step="0.1" value="10"></label>
      <button id="reset-scene-settings-button" type="button" class="quiet">Reset Scene Settings</button>
    </section>

    <details class="control-group" data-section="json">
      <summary>JSON</summary>
      <div class="details-body">
        <textarea id="json-preview" spellcheck="false"></textarea>
        <div class="control-row">
          <button id="apply-json-button" type="button">Apply JSON</button>
          <button id="export-json-button" type="button">Export JSON</button>
        </div>
      </div>
    </details>

    <section class="control-group" data-default-open="true">
      <div class="section-title">Session</div>
      <div class="control-row">
        <button id="save-model-button" type="button">Save</button>
        <button id="reset-model-button" type="button" class="danger">Reset</button>
      </div>
      <pre id="layout-status" aria-live="polite"></pre>
    </section>
  </aside>

  <div id="toast" role="status" aria-live="polite"></div>

<script type="module" src="./js/test_dynamic_hbds_layout.js?v=attribute-rendering-20260522a"></script>
</body>
</html>
